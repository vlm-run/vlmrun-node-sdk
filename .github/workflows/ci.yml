name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - next

jobs:
  security:
    name: security
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Security audit
        run: npm audit --audit-level moderate

  build:
    name: build
    runs-on: ubuntu-latest
    needs: security

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Validate publish tarball entrypoints
        run: |
          node scripts/utils/make-dist-package-json.cjs > dist/package.json
          cd dist
          node -e "const p=require('./package.json'); const fs=require('fs'); for (const k of ['main','module','types']) { const file=p[k].replace(/^\.\//,''); if (!fs.existsSync(file)) { console.error('Missing', k, p[k]); process.exit(1); } }"
          npm pack --dry-run

  test:
    name: test
    runs-on: ubuntu-latest
    needs: security

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm run test
